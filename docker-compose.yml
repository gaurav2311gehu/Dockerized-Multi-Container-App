version:  '3.8'
services:
  frontend:
    image: gauravsaini2311/frontend:v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
  backend:
    image: gauravsaini2311/backend:v1
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/myapp
    depends_on:
      - mongo
  
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  nginx:
    image: nginx:latest
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend